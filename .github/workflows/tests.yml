name: tests
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install ruff
      - run: ruff check foamgci tests
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ matrix.python-version }}" }
      - run: pip install -e ".[dev]" pytest-cov
      # Cross-validate KPSS against statsmodels on one leg only
      # (it is intentionally NOT a foamgci dependency).
      - if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: pip install statsmodels
      - run: pytest -q --cov=foamgci --cov-report=term-missing --cov-fail-under=75

